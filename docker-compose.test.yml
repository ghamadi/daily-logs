services:
  postgres-test:
    image: postgres:17
    ports:
      # Host:Container
      # Connect from machine to localhost:5443
      - "5443:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d test_db"]
      interval: 2s
      timeout: 5s
      retries: 15
