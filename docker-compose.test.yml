services:
  postgres-test:
    image: postgres:17
    ports:
      - "5443:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: daily_logs_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d daily_logs_test"]
      interval: 2s
      timeout: 5s
      retries: 15
